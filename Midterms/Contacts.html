<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Paul Villaflor</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="navbar">
        <button class="btn" id="HomeBtn">Home</button>
        <button class="btn" id="AboutBtn">About</button>
        <button class="btn" id="SkillsBtn">Skills</button>
        <button class="btn" id="ProjectsBtn">Projects</button>
        <button class="btn" id="ContactBtn">Contact</button>
    </div>

    <div class="header">

        <div class="header-right">
            <h1>Paul Villaflor</h1>
            <p>Aspiring Developer & IT Student</p>
        </div>

        <button class="btn" id="DarkMode">
            Dark Mode
        </button>

    </div>

    <div style="text-align: center; margin-top: 30px;">

        <h2 style="font-size: 50px;">
            Contact Me
        </h2>

        <p style="font-size: 20px;">
            Feel free to send me a message for questions,
            opportunities, or collaborations.
        </p>

    </div>

    <div class="containerwrapper">

        <div class="container" style="max-width: 700px;">

            <form>

                <label for="name">
                    <h3>Your Name</h3>
                </label>

                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Enter your name"
                    style="
                        width: 100%;
                        padding: 12px;
                        border-radius: 8px;
                        border: 1px solid gray;
                        margin-bottom: 20px;
                    "
                >

                <label for="email">
                    <h3>Email Address</h3>
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    style="
                        width: 100%;
                        padding: 12px;
                        border-radius: 8px;
                        border: 1px solid gray;
                        margin-bottom: 20px;
                    "
                >

                <label for="subject">
                    <h3>Subject</h3>
                </label>

                <input
                    type="text"
                    id="subject"
                    name="subject"
                    placeholder="Enter subject"
                    style="
                        width: 100%;
                        padding: 12px;
                        border-radius: 8px;
                        border: 1px solid gray;
                        margin-bottom: 20px;
                    "
                >

                <label for="message">
                    <h3>Message</h3>
                </label>

                <textarea
                    id="message"
                    name="message"
                    rows="8"
                    placeholder="Write your message here..."
                    style="
                        width: 100%;
                        padding: 12px;
                        border-radius: 8px;
                        border: 1px solid gray;
                        resize: vertical;
                        margin-bottom: 20px;
                    "
                ></textarea>

                <button
                    type="submit"
                    class="btn"
                    style="
                        width: 100%;
                        font-size: 18px;
                    "
                >
                    Send Message
                </button>

            </form>

        </div>

    </div>

    <div style="text-align: center; padding: 30px;">

        <p>
            You may also contact me through social media or email.
        </p>

    </div>

    <script src="script.js"></script>

</body>
</html>
